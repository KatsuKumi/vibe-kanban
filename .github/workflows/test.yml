name: Test

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - .github/workflows/**
      - '!.github/workflows/test.yml'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 22
  PNPM_VERSION: 10.13.1
  RUNNER_LABEL: &runner_label blacksmith-16vcpu-ubuntu-2404

jobs:
  frontend-test:
    runs-on: *runner_label
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        run: pnpm install

      - name: Run checks
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -x
          (cd frontend && npm run lint) & pid_lint=$!
          (GITHUB_BASE_REF=${{ github.base_ref || 'main' }} ./scripts/check-i18n.sh) & pid_i18n=$!
          (cd frontend && npm run format:check) & pid_fmt=$!
          (cd frontend && npm run build) & pid_build=$!
          wait $pid_lint
          wait $pid_i18n
          wait $pid_fmt
          wait $pid_build

  backend-schema-checks:
    runs-on: *runner_label
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Setup sccache
        uses: BloopAI/sccache-action@main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-12-04

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        env:
          RUST_CACHE_DEBUG: true
        with:
          workspaces: "."
          cache-provider: "github"
          cache-on-failure: true
          shared-key: "backend-schema-checks-${{ runner.os }}-${{ runner.arch }}-${{ env.RUNNER_LABEL }}"
          cache-all-crates: true

      - name: Install sqlx-cli
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f # v3.0.1
        with:
          tool: sqlx-cli
          no-default-features: true
          features: sqlite,postgres

      - name: Checks
        run: |
          set -x
          npm run generate-types:check
          npm run prepare-db:check

  backend-remote-checks:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: *runner_label
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Setup sccache
        uses: BloopAI/sccache-action@main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-12-04

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        env:
          RUST_CACHE_DEBUG: true
        with:
          workspaces: "."
          cache-provider: "github"
          cache-on-failure: true
          shared-key: "backend-remote-checks-${{ runner.os }}-${{ runner.arch }}-${{ env.RUNNER_LABEL }}"
          cache-all-crates: true

      - name: Setup SSH Agent for private dependencies
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VK_PRIVATE_DEPLOY_KEY }}

      - name: Install sqlx-cli
        uses: taiki-e/cache-cargo-install-action@34ce5120836e5f9f1508d8713d7fdea0e8facd6f # v3.0.1
        with:
          tool: sqlx-cli
          no-default-features: true
          features: sqlite,postgres

      - name: Remote crate checks
        run: |
          set -x
          npm run remote:generate-types:check
          npm run remote:prepare-db:check

  backend-clippy:
    runs-on: *runner_label
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6

      - name: Setup sccache
        uses: BloopAI/sccache-action@main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-12-04
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        env:
          RUST_CACHE_DEBUG: true
        with:
          workspaces: "."
          cache-provider: "github"
          cache-on-failure: true
          shared-key: "backend-clippy-${{ runner.os }}-${{ runner.arch }}-${{ env.RUNNER_LABEL }}"
          cache-all-crates: true

      - name: Run Checks
        run: |
          set -x
          cargo fmt --all -- --check & pid_fmt=$!
          cargo clippy --all --all-targets -- -D warnings
          wait $pid_fmt

  backend-test:
    runs-on: *runner_label
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Setup sccache
        uses: BloopAI/sccache-action@main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-12-04
          # No extra components needed for testing

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        env:
          RUST_CACHE_DEBUG: true
        with:
          workspaces: "."
          cache-provider: "github"
          cache-on-failure: true
          shared-key: "backend-test-${{ runner.os }}-${{ runner.arch }}-${{ env.RUNNER_LABEL }}"
          cache-all-crates: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace
